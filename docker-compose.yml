# OrderFlow local stack. M3 brings up infra + order-service + inventory-service + payment-service + shipment-service.
# Run everything:        docker compose up --build
# Run infra only:        docker compose up postgres kafka redis
#   (then run services on host with: mvn -pl order-service spring-boot:run, etc.)
#
# Kafka note: containers reach the broker at kafka:9092 (INTERNAL listener); host processes
# reach it at localhost:29092 (EXTERNAL listener) — see KAFKA_ADVERTISED_LISTENERS below.

services:
  postgres:
    image: postgres:16-alpine
    container_name: orderflow-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_ADMIN_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_ADMIN_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-orderflow}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_ADMIN_USER:-postgres} -d ${POSTGRES_DB:-orderflow}"]
      interval: 5s
      timeout: 5s
      retries: 10

  kafka:
    image: apache/kafka:3.8.1
    container_name: orderflow-kafka
    ports:
      - "29092:29092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: INTERNAL://:9092,CONTROLLER://:9093,EXTERNAL://:29092
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:9092,EXTERNAL://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: orderflow-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  order-service:
    build:
      context: .
      dockerfile: order-service/Dockerfile
    container_name: orderflow-order
    depends_on:
      postgres: { condition: service_healthy }
      kafka: { condition: service_healthy }
      redis: { condition: service_healthy }
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-orderflow}
      SPRING_DATASOURCE_USERNAME: ${ORDER_DB_USER:-order_user}
      SPRING_DATASOURCE_PASSWORD: ${ORDER_DB_PASSWORD:-order_pw}
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: "6379"
    ports:
      - "8080:8080"

  inventory-service:
    build:
      context: .
      dockerfile: inventory-service/Dockerfile
    container_name: orderflow-inventory
    depends_on:
      postgres: { condition: service_healthy }
      kafka: { condition: service_healthy }
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-orderflow}
      SPRING_DATASOURCE_USERNAME: ${INVENTORY_DB_USER:-inventory_user}
      SPRING_DATASOURCE_PASSWORD: ${INVENTORY_DB_PASSWORD:-inventory_pw}
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    ports:
      - "8081:8081"

  payment-service:
    build:
      context: .
      dockerfile: payment-service/Dockerfile
    container_name: orderflow-payment
    depends_on:
      postgres: { condition: service_healthy }
      kafka: { condition: service_healthy }
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-orderflow}
      SPRING_DATASOURCE_USERNAME: ${PAYMENT_DB_USER:-payment_user}
      SPRING_DATASOURCE_PASSWORD: ${PAYMENT_DB_PASSWORD:-payment_pw}
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    ports:
      - "8082:8082"

  shipment-service:
    build:
      context: .
      dockerfile: shipment-service/Dockerfile
    container_name: orderflow-shipment
    depends_on:
      postgres: { condition: service_healthy }
      kafka: { condition: service_healthy }
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-orderflow}
      SPRING_DATASOURCE_USERNAME: ${SHIPMENT_DB_USER:-shipment_user}
      SPRING_DATASOURCE_PASSWORD: ${SHIPMENT_DB_PASSWORD:-shipment_pw}
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    ports:
      - "8083:8083"

volumes:
  pgdata:
